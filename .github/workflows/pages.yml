name: Publicar no GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      # Migração concluída: a produção é o Azure Static Web Apps. O GitHub Pages
      # agora apenas REDIRECIONA (preservando a rota em hash) — não serve mais o app.
      # Reverter: trocar `path: ./redirect` de volta por `path: .`.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./redirect
      - id: deployment
        uses: actions/deploy-pages@v4
