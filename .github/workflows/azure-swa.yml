name: Deploy to Azure Static Web Apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Fase 1 da migração (espelha o SANE): publica o app ESTÁTICO (HTML/CSS/JS ES
# modules, SEM build) da raiz do repositório no Azure Static Web Apps, EM
# PARALELO ao GitHub Pages. Nada de npm/Vite — o site já é o conteúdo servido.
#
# Fica INERTE (job verde, sem publicar) enquanto o secret
# AZURE_STATIC_WEB_APPS_API_TOKEN não existir. Assim que você criar o recurso
# SWA e cadastrar o token (ver docs/AZURE-SWA-SETUP.md), o deploy passa a rodar.
# ---------------------------------------------------------------------------
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        if: ${{ env.SWA_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: "upload"
          app_location: "/"      # raiz do repo (index.html, js/, css/, docs/…)
          api_location: ""       # sem API nesta fase (entra na Fase 2)
          output_location: ""    # sem build: publica app_location como está
          skip_app_build: true
