<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="fundo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3E4A2E"/>
      <stop offset="1" stop-color="#2C351F"/>
    </linearGradient>
    <linearGradient id="ouro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9B98C"/>
      <stop offset="1" stop-color="#A6925A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#fundo)"/>
  <!-- textura discreta: linhas diagonais -->
  <g stroke="#F5F4EE" stroke-opacity="0.03" stroke-width="2">
    <line x1="800" y1="-50" x2="1350" y2="500"/>
    <line x1="880" y1="-50" x2="1430" y2="500"/>
    <line x1="960" y1="-50" x2="1510" y2="500"/>
    <line x1="1040" y1="-50" x2="1590" y2="500"/>
  </g>
  <!-- marca: E de três barras douradas (favicon) -->
  <g transform="translate(154,170)">
    <rect x="0" y="0" width="150" height="34" rx="10" fill="url(#ouro)"/>
    <rect x="0" y="52" width="108" height="34" rx="10" fill="url(#ouro)"/>
    <rect x="0" y="104" width="150" height="34" rx="10" fill="url(#ouro)"/>
    <rect x="-34" y="0" width="18" height="138" rx="9" fill="url(#ouro)"/>
  </g>
  <!-- títulos -->
  <text x="120" y="425" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="78" font-weight="bold" fill="#F5F4EE">Portal da Engenharia</text>
  <text x="122" y="482" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="40" fill="#C9B98C">Colégio Pedro II</text>
  <!-- linha e rodapé -->
  <rect x="122" y="518" width="956" height="3" rx="1.5" fill="#A6925A" fill-opacity="0.55"/>
  <text x="122" y="560" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="26" fill="#F5F4EE" fill-opacity="0.75">Obras e serviços de engenharia — acompanhamento das demandas</text>
</svg>
